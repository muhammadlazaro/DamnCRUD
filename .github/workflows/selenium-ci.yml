name: DamnCRUD CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASS: ''
      DB_NAME: damncrud
      BASE_URL: http://localhost:8080

    steps:

    # 1️ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️ Setup PHP
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo_mysql, mysqli

    # 3️ Wait for MySQL and import database
    - name: Wait for MySQL and import database
      run: |
        echo "Waiting for MySQL to be ready..."
        for i in {1..30}; do
          if mysql -h 127.0.0.1 -P 3306 -u root -e "SELECT 1" > /dev/null 2>&1; then
            echo "✓ MySQL is ready!"
            break
          fi
          echo "Attempt $i/30: MySQL not ready yet..."
          sleep 1
        done
        echo "Importing database..."
        mysql -h 127.0.0.1 -P 3306 -u root < db/damncrud.sql || true
        echo "✓ Database imported"

    # 4️ Start PHP built-in server
    - name: Start PHP server
      run: |
        echo "Starting PHP server on port 8080..."
        php -S localhost:8080 -t . > /tmp/php_server.log 2>&1 &
        PHP_PID=$!
        echo "PHP Server PID: $PHP_PID"
        
        echo "Waiting for server to be ready..."
        MAX_ATTEMPTS=40
        for i in $(seq 1 $MAX_ATTEMPTS); do
          sleep 1
          echo "Health check attempt $i/$MAX_ATTEMPTS..."
          
          # Try to fetch login page and check if username field exists
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8080/login.php 2>/dev/null)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q "inputUsername"; then
            echo "✓ Server is ready! Login page loaded successfully."
            break
          fi
          
          if [ $i -eq $MAX_ATTEMPTS ]; then
            echo "✗ Server failed to start properly after $MAX_ATTEMPTS attempts!"
            echo "HTTP Code: $HTTP_CODE"
            echo "Server log:"
            cat /tmp/php_server.log
            exit 1
          fi
        done
        
        # Extra wait to ensure stability
        sleep 5
        echo "Final server test..."
        curl -v http://localhost:8080/login.php 2>&1 | head -20

    # 5️ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    # 6️ Setup Chrome
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # 7️ Run Selenium Tests
    - name: Run tests
      run: |
        pytest selenium/tests \
          -v \
          --tb=short \
          --junit-xml=test-results.xml \
          -p no:xdist

    # 8️ Upload results
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results.xml

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: screenshots
        path: screenshoot/

    # 9️ Show PHP log if failure
    - name: Show PHP log (on failure)
      if: failure()
      run: cat /tmp/php_server.log